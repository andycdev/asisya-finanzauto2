name: Asisya CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Validar el Backend (.NET)
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore ./backend/*.csproj
      - name: Build Backend
        run: dotnet build ./backend/*.csproj --no-restore --configuration Release

  # 2. Validar el Frontend (React)
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './asisya-frontend/package-lock.json'
      - name: Install dependencies
        run: npm install --prefix ./asisya-frontend
      - name: Build Frontend
        run: npm run build --prefix ./asisya-frontend

  # 3. Validar que Docker puede construir las imágenes
  docker-build-test:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend] # Solo corre si los pasos anteriores pasaron
    steps:
      - uses: actions/checkout@v4
      - name: Build images with Docker Compose
        run: docker compose build